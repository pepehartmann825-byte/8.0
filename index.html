<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Comic Social App</title>

<style>
body{
margin:0;
font-family:system-ui, Arial;
background:#0a0a0a;
color:white;
}

.nav{
display:flex;
background:#0f172a;
padding:10px;
position:sticky;
top:0;
}

.nav button{
flex:1;
padding:14px;
border:none;
background:none;
color:#94a3b8;
}

.nav button.active{color:#22c55e;}

.screen{display:none;padding:18px;}
.screen.active{display:block;}

.card{
background:#111827;
margin:10px 0;
padding:14px;
border-radius:14px;
}

input{
width:100%;
padding:10px;
margin:5px 0;
border-radius:10px;
border:none;
background:#1f2937;
color:white;
}

button{
padding:8px 12px;
margin-top:6px;
border:none;
border-radius:10px;
background:#1f2937;
color:white;
cursor:pointer;
}

button:hover{background:#374151;}

.small{opacity:0.8;font-size:13px;}
</style>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

</head>

<body>

<div class="nav">
<button onclick="show('home',this)" class="active">🏠</button>
<button onclick="show('collection',this)">📚</button>
<button onclick="show('profile',this)">👤</button>
</div>

<!-- HOME -->
<div id="home" class="screen active">

<h2>📚 Comic Feed</h2>

<input id="search" placeholder="🔍 Suche..." oninput="render()">

<div id="feed">Loading...</div>
</div>

<!-- COLLECTION -->
<div id="collection" class="screen">
<h2>📖 Deine Sammlung</h2>
<div id="collectionList"></div>
</div>

<!-- PROFILE -->
<div id="profile" class="screen">
<h2>👤 Login</h2>

<button onclick="login()">🔐 Google Login</button>
<p id="status">Offline</p>

<div id="admin" style="display:none">
<h3>🧑‍💻 Admin Panel</h3>

<input id="title" placeholder="Titel">
<input id="author" placeholder="Autor">
<input id="publisher" placeholder="Publisher">
<input id="pages" placeholder="Seiten">

<button onclick="addComic()">➕ Comic erstellen</button>
</div>

</div>

<script>

/* 🔥 FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyD7rATqBEgOi1BMK9kI0Qr5ro825vINx_A",
  authDomain: "comic-tracker-11dce.firebaseapp.com",
  projectId: "comic-tracker-11dce",
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();
const provider = new firebase.auth.GoogleAuthProvider();

let user=null;
let comics=[];
let collection=[];
let selected=null;

const ADMIN="pepehartmann825@gmail.com";

/* NAV */
function show(id,btn){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");

document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
}

/* LOGIN FIX */
let logging=false;
function login(){
if(logging)return;
logging=true;

auth.signInWithPopup(provider)
.then(r=>{
user=r.user.email;
status.innerText=user;

if(user===ADMIN){
document.getElementById("admin").style.display="block";
}

load();
loadCollection();
})
.finally(()=>logging=false);
}

auth.onAuthStateChanged(u=>{
if(u){
user=u.email;
status.innerText=user;

if(user===ADMIN){
document.getElementById("admin").style.display="block";
}

load();
loadCollection();
}
});

/* ADD COMIC */
function addComic(){
db.collection("comics").add({
title:title.value,
author:author.value,
publisher:publisher.value,
pages:pages.value
});
load();
}

/* LOAD */
function load(){
db.collection("comics").get().then(s=>{
comics=[];
s.forEach(d=>comics.push({id:d.id,...d.data()}));
render();
});
}

/* COLLECTION */
function loadCollection(){
if(!user)return;

db.collection("users").doc(user)
.collection("collection").get()
.then(s=>{
collection=[];
s.forEach(d=>collection.push({id:d.id,...d.data()}));
render();
});
}

/* LIKE SYSTEM */
function toggleLike(c){

const ref=db.collection("comics")
.doc(c.id)
.collection("likes")
.doc(user);

ref.get().then(d=>{
d.exists?ref.delete().then(render):ref.set({like:true}).then(render);
});
}

/* ADD COLLECTION */
function addToCollection(i){
const c=comics[i];

db.collection("users").doc(user)
.collection("collection")
.doc(c.id)
.set(c)
.then(loadCollection);
}

/* REMOVE */
function removeFromCollection(id){
db.collection("users").doc(user)
.collection("collection")
.doc(id)
.delete()
.then(loadCollection);
}

/* SEARCH */
function getFiltered(){
let q=document.getElementById("search").value.toLowerCase();

return comics.filter(c=>
(c.title||"").toLowerCase().includes(q) ||
(c.author||"").toLowerCase().includes(q) ||
(c.publisher||"").toLowerCase().includes(q)
);
}

/* DELETE ADMIN */
function del(i){
if(user!==ADMIN)return;

db.collection("comics")
.doc(comics[i].id)
.delete()
.then(load);
}

/* RENDER */
async function render(){

let list=getFiltered();

/* FEED */
document.getElementById("feed").innerHTML =
await Promise.all(list.map(async (c,i)=>{

const snap=await db.collection("comics")
.doc(c.id).collection("likes").get();

const liked=snap.docs.some(d=>d.id===user);

return `
<div class="card" onclick="openComic(${i})">

<h3>${c.title}</h3>

<p class="small">✍️ ${c.author||"-"}</p>
<p class="small">🏢 ${c.publisher||"-"}</p>
<p class="small">📄 ${c.pages||0} Seiten</p>

<p>❤️ ${snap.size} Likes</p>

<button onclick="event.stopPropagation(); addToCollection(${i})">➕ Sammlung</button>

<button onclick="event.stopPropagation(); toggleLike(comics[${i}])">
${liked?"💔 Unlike":"❤️ Like"}
</button>

${user===ADMIN?`<button onclick="del(${i})">🗑</button>`:""}

</div>
`;
})).then(x=>x.join(""));

/* COLLECTION */
let total=collection.reduce((s,c)=>s+Number(c.pages||0),0);

document.getElementById("collectionList").innerHTML=`
<h3>📖 Gesamt Seiten: ${total}</h3>

${collection.map(c=>`
<div class="card">
<h3>${c.title}</h3>
<p>${c.author||""}</p>
<p>${c.publisher||""}</p>
<p>${c.pages}</p>

<button onclick="removeFromCollection('${c.id}')">🗑 Entfernen</button>
</div>
`).join("")}
`;
}

load();

</script>

</body>
</html>
